<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Turno confirmado</title>
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:system-ui,sans-serif;color:#e8eaed;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;margin:0 auto;padding:24px;">
    <tr>
      <td style="background:#1a1d27;border-radius:12px;padding:32px;border:1px solid #2a2f3d;">
        <h1 style="margin:0 0 16px;font-size:22px;color:#fff;">Turno confirmado</h1>
        <p style="margin:0 0 12px;line-height:1.5;">Hola {{clienteNombre}},</p>
        <p style="margin:0 0 12px;line-height:1.5;">Tu turno en <strong>{{localNombre}}</strong> quedó confirmado.</p>
        <p style="margin:0 0 8px;"><strong>Fecha:</strong> {{fecha}}</p>
        <p style="margin:0 0 8px;"><strong>Hora:</strong> {{hora}}</p>
        <p style="margin:0 0 16px;"><strong>Dirección:</strong> {{direccion}}</p>
        <a href="{{linkGestion}}" style="display:inline-block;background:#6366f1;color:#fff;text-decoration:none;padding:12px 20px;border-radius:8px;font-weight:600;">Gestionar mi turno</a>
      </td>
    </tr>
  </table>
</body>
</html>
